<!doctype html>
<html lang="fr">
<head>
    <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P2MDTEBQVF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-P2MDTEBQVF");
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ABA — Atelier Boumahdi Adil | Bientôt en ligne</title>
  <meta name="description" content="ABA Atelier Boumahdi Adil — Studio de paysagisme premium au Maroc. Site en cours de préparation." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://www.ab-landscapes.com/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #BACC23;
      --black: #1A1A1A;
      --white: #F6F4EE;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    /* ── Grain texture overlay ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.04'/></svg>");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Animated background line ── */
    body::after {
      content: "";
      position: fixed;
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(186,204,35,0.15), transparent);
      transform: translateX(-50%);
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(32px, 5vw, 64px);
    }

    /* ── Center block ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
    }

    /* ── Logo mark ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.2s;
    }

    .logo-svg {
      width: 36px;
      height: 36px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    .logo-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--white);
    }

    .logo-sub {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(246,244,238,0.45);
      margin-top: 3px;
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(186,204,35,0.4);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.5s;
    }

    /* ── Main headline ── */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(38px, 6vw, 80px);
      line-height: 1.1;
      letter-spacing: 0.01em;
      color: var(--white);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.7s;
    }

    .headline em {
      font-style: normal;
      color: var(--green);
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(246,244,238,0.5);
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.9s;
    }

    /* ── Lang switcher pills ── */
    .langs {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.1s;
    }

    .lang-pill {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid rgba(246,244,238,0.15);
      color: rgba(246,244,238,0.4);
      background: transparent;
      cursor: pointer;
      transition: all 200ms;
    }

    .lang-pill:hover,
    .lang-pill.active {
      border-color: var(--green);
      color: var(--green);
    }

    /* ── Animated dot ── */
    .dot-wrap {
      margin-top: 56px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.3s;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.4s ease-in-out infinite;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.5s;
    }

    .footer-left {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(246,244,238,0.3);
      font-weight: 300;
    }

    .footer-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .contact-link {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(246,244,238,0.4);
      font-weight: 300;
      text-decoration: none;
      transition: color 200ms;
    }

    .contact-link:hover { color: var(--green); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .footer { flex-direction: column; align-items: center; gap: 16px; text-align: center; }
      .footer-right { align-items: center; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- ── CENTER ── -->
  <div class="center">

    <!-- Logo -->
    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,2 38,36 2,36" fill="none" stroke="#BACC23" stroke-width="1.5"/>
        <polygon points="20,10 32,33 8,33" fill="none" stroke="rgba(186,204,35,0.35)" stroke-width="0.8"/>
        <line x1="20" y1="2" x2="20" y2="36" stroke="rgba(186,204,35,0.2)" stroke-width="0.6"/>
      </svg>
      <div class="logo-text">
        <span class="logo-name">A B A</span>
        <span class="logo-sub">Atelier Boumahdi Adil</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Headline multilingue -->
    <h1 class="headline" id="headline">
      Quelque chose d'<em>exceptionnel</em><br>se prépare.
    </h1>

    <p class="tagline" id="tagline">
      Site en préparation — Bientôt en ligne
    </p>

    <!-- Lang switcher -->
    <div class="langs">
      <button class="lang-pill active" onclick="setLang('fr')">FR</button>
      <button class="lang-pill" onclick="setLang('en')">EN</button>
      <button class="lang-pill" onclick="setLang('es')">ES</button>
    </div>

    <!-- Pulsing dot -->
    <div class="dot-wrap">
      <div class="dot"></div>
    </div>

  </div>

  <!-- ── FOOTER ── -->
  <div class="footer">
    <div class="footer-left">
      Rabat · Casablanca · Marrakech · Fès
    </div>
    <div class="footer-right">
      <a class="contact-link" href="mailto:info@ab-landscapes.com">info@ab-landscapes.com</a>
      <a class="contact-link" href="https://www.instagram.com/atelier.aba" target="_blank">Instagram — @atelier.aba</a>
    </div>
  </div>

</div>

<script>
  const content = {
    fr: {
      headline: 'Quelque chose d\'<em>exceptionnel</em><br>se prépare.',
      tagline:  'Site en préparation — Bientôt en ligne'
    },
    en: {
      headline: 'Something <em>exceptional</em><br>is coming.',
      tagline:  'Under construction — Stay tuned'
    },
    es: {
      headline: 'Algo <em>excepcional</em><br>se está preparando.',
      tagline:  'Sitio en preparación — Próximamente'
    }
  };

  function setLang(lang) {
    const h = document.getElementById('headline');
    const t = document.getElementById('tagline');
    const pills = document.querySelectorAll('.lang-pill');

    h.style.opacity = '0';
    h.style.transform = 'translateY(8px)';
    h.style.transition = 'all 250ms';

    setTimeout(() => {
      h.innerHTML = content[lang].headline;
      t.textContent = content[lang].tagline;
      h.style.opacity = '1';
      h.style.transform = 'translateY(0)';
    }, 250);

    pills.forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
  }
</script>

</body>
</html>
