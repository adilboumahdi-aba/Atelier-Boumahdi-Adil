    :root {

    body.tweaked [class*="py-32"] { padding-top: var(--section-pad-y); padding-bottom: var(--section-pad-y); }

    body.grain::after {

      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");

    /* Designer grid overlay */
    body.show-grid::before {
      content: "";

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ---------- Hooks ----------
function useScrollProgress() {
  const [y, setY] = useState(0);
  useEffect(() => {
    let raf = 0;
    const onScroll = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => setY(window.scrollY));
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return y;
}

function useReveal(threshold = 0.18) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            setShown(true);
            io.disconnect();
          }
        });
      },
      { threshold }
    );
    io.observe(ref.current);
    return () => io.disconnect();
  }, [threshold]);
  return [ref, shown];
}

// ---------- Reveal wrapper ----------
function Reveal({ children, delay = 0, y = 24, className = "", as: Tag = "div" }) {
  const [ref, shown] = useReveal();
  return (
    <Tag
      ref={ref}
      className={className}
      style={{
        opacity: shown ? 1 : 0,
        transform: shown ? "translate3d(0,0,0)" : `translate3d(0, ${y}px, 0)`,
        transition: `opacity 1100ms cubic-bezier(.22,.61,.36,1) ${delay}ms, transform 1100ms cubic-bezier(.22,.61,.36,1) ${delay}ms`,
        willChange: "opacity, transform",
      }}
    >
      {children}
    </Tag>
  );
}

async function loadLang(lang) {
  if (I18N_CACHE[lang]) return I18N_CACHE[lang];
  try {

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    I18N_CACHE[lang] = data;
    return data;
  } catch (e) {
    console.warn(`[i18n] Impossible de charger ${lang}.json, fallback FR`, e);
    // Fallback : on renvoie le cache FR s'il existe, sinon on recharge FR
    if (lang !== "fr") return loadLang("fr");
    return {};
  }
}

// ---------- LIGHTBOX COMPONENT ----------
function Lightbox({ projectTitle, accent, onClose }) {
  const { t } = React.useContext(VBLangContext);
  const data = PROJECT_DATA[projectTitle];
  const [idx, setIdx] = useState(0);
  const touchStartX = useRef(null);

  // Keyboard navigation + Escape
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowRight") setIdx((i) => (i + 1) % (data?.photos?.length || 1));
      if (e.key === "ArrowLeft") setIdx((i) => (i - 1 + (data?.photos?.length || 1)) % (data?.photos?.length || 1));
    };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [onClose, data]);

  if (!data) return null;
  const total = data.photos.length;
  const prev = () => setIdx((i) => (i - 1 + total) % total);
  const next = () => setIdx((i) => (i + 1) % total);

  const onTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const diff = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(diff) > 40) diff < 0 ? next() : prev();
    touchStartX.current = null;
  };

  return (
    <div
      style={{
        position: "fixed", inset: 0, zIndex: 9000,
        background: "rgba(0,0,0,0.93)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
      }}
      onClick={(e) => e.target === e.currentTarget && onClose()}
    >
      {/* Close button */}
      <button
        onClick={onClose}
        style={{
          position: "absolute", top: 20, right: 24,
          background: "transparent", border: `1px solid rgba(255,255,255,0.25)`,
          color: "#fff", width: 44, height: 44,
          fontSize: 22, lineHeight: 1, cursor: "pointer",
          display: "grid", placeItems: "center",
          transition: "border-color 200ms",
          zIndex: 9001,
        }}
        onMouseEnter={(e) => e.currentTarget.style.borderColor = accent}
        onMouseLeave={(e) => e.currentTarget.style.borderColor = "rgba(255,255,255,0.25)"}
        aria-label={t?.portfolio?.lb_close || "Fermer"}
      >✕</button>

      {/* Photo counter */}
      <div style={{
        position: "absolute", top: 28, left: 28,
        fontFamily: "'Inter', sans-serif", fontSize: 11,
        letterSpacing: "0.3em", color: "rgba(255,255,255,0.5)",
        zIndex: 9001,
      }}>
        {String(idx + 1).padStart(2, "0")} / {String(total).padStart(2, "0")}
      </div>

      {/* Main image area */}
      <div
        style={{ position: "relative", width: "100%", maxWidth: 1100, padding: "0 72px", boxSizing: "border-box" }}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <img
          key={idx}
          src={data.photos[idx]}
          alt={`${projectTitle} — photo ${idx + 1}`}
          style={{
            width: "100%", maxHeight: "62vh",
            objectFit: "contain",
            display: "block",
            margin: "0 auto",
            animation: "lbFadeIn 220ms ease",
          }}
        />

        {/* Arrow left */}
        {total > 1 && (
          <button
            onClick={prev}
            style={{
              position: "absolute", left: 0, top: "50%", transform: "translateY(-50%)",
              width: 56, height: 56, background: "transparent",
              border: `1px solid rgba(255,255,255,0.2)`, color: "#fff",
              fontSize: 22, cursor: "pointer", display: "grid", placeItems: "center",
              transition: "border-color 200ms, background 200ms",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = accent; e.currentTarget.style.background = "rgba(255,255,255,0.06)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.2)"; e.currentTarget.style.background = "transparent"; }}
            aria-label={t?.portfolio?.lb_prev || "Photo précédente"}
          >‹</button>
        )}

        {/* Arrow right */}
        {total > 1 && (
          <button
            onClick={next}
            style={{
              position: "absolute", right: 0, top: "50%", transform: "translateY(-50%)",
              width: 56, height: 56, background: "transparent",
              border: `1px solid rgba(255,255,255,0.2)`, color: "#fff",
              fontSize: 22, cursor: "pointer", display: "grid", placeItems: "center",
              transition: "border-color 200ms, background 200ms",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = accent; e.currentTarget.style.background = "rgba(255,255,255,0.06)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.2)"; e.currentTarget.style.background = "transparent"; }}
            aria-label={t?.portfolio?.lb_next || "Photo suivante"}
          >›</button>
        )}
      </div>

      {/* Info panel */}
      <div style={{
        marginTop: 28, width: "100%", maxWidth: 1100,
        padding: "0 72px", boxSizing: "border-box",
        display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 32,
      }}>
        <div>
          <div style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 300, fontSize: "clamp(20px, 3vw, 34px)", color: "#fff", letterSpacing: "-0.01em", lineHeight: 1 }}>
            {projectTitle}
          </div>
          <div style={{ marginTop: 8, fontFamily: "'Inter', sans-serif", fontSize: 12, letterSpacing: "0.3em", color: "rgba(255,255,255,0.5)", textTransform: "uppercase" }}>
            {data.loc} — {data.year}

            {data.desc}
          </div>
        </div>
        <div style={{ flexShrink: 0, textAlign: "right" }}>
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, letterSpacing: "0.3em", color: "rgba(255,255,255,0.4)", textTransform: "uppercase", marginBottom: 4 }}>{t?.portfolio?.lb_client || "Client"}</div>
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: "rgba(255,255,255,0.8)" }}>{data.client}</div>
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, letterSpacing: "0.3em", color: "rgba(255,255,255,0.4)", textTransform: "uppercase", marginTop: 12, marginBottom: 4 }}>{t?.portfolio?.lb_budget || "Budget"}</div>
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: accent }}>{data.budget}</div>
        </div>
      </div>

      <style>{`
        @keyframes lbFadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
      `}</style>
    </div>
  );
}

function Contact({ accent }) {
  const { t } = React.useContext(VBLangContext);
  const [form, setForm] = useState({ name: "", email: "", phone: "", projects: [], message: "" });
  const [errors, setErrors] = useState({});
  const toggleProject = (k) => {
    if (k === "clé-en-main") {
      // Sélectionne tout ou désélectionne tout
      const allKeys = ["design","realisation","entretien","conseil"];
      const allSelected = allKeys.every(x => form.projects.includes(x));
      setForm({ ...form, projects: allSelected ? [] : allKeys });
    } else {
      const next = form.projects.includes(k)
        ? form.projects.filter(x => x !== k)
        : [...form.projects.filter(x => x !== "clé-en-main"), k];
      setForm({ ...form, projects: next });
    }
  };
  const allSelected = ["design","realisation","entretien","conseil"].every(x => form.projects.includes(x));
  const [sent, setSent] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    // Validation
    const newErrors = {};
    if (!form.name.trim())  newErrors.name  = true;
    if (!form.email.trim()) newErrors.email = true;
    if (!form.phone.trim()) newErrors.phone = true;
    if (form.projects.length === 0) newErrors.projects = true;
    if (Object.keys(newErrors).length > 0) { setErrors(newErrors); return; }
    setErrors({});
    if (submitting) return;
    setSubmitting(true);
    try {
      const res = await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          access_key: "1eba26f0-bd01-4151-ba20-80f605bce534",
          name: form.name,
          email: form.email,
          phone: form.phone,
          project_type: (() => {
            const labels = { design: "Conception", realisation: "Réalisation", entretien: "Entretien signé", conseil: "Conseil" };
            return form.projects.length > 0 ? form.projects.map(k => labels[k] || k).join(" + ") : "(non précisé)";
          })(),
          message: form.message || "(aucun message)",
          subject: (() => {
            const labels = { design: "Conception", realisation: "Réalisation", entretien: "Entretien signé", conseil: "Conseil" };
            const prestations = form.projects.map(k => labels[k] || k).join(" + ") || "non précisé";
            return `[ABA] Nouveau projet — ${prestations} — ${form.name}`;
          })(),
          from_name: "ABA — Site Web",
        }),
      });
      const data = await res.json();
      if (data.success) { setSent(true); }
      else { setSent(true); } // affiche quand même le succès côté client
    } catch (err) {
      setSent(true); // fallback offline
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <section id="contact" data-section="contact" className="relative bg-[#1A1A1A] text-white" style={{ paddingTop: 160, paddingBottom: 100 }}
      data-screen-label="06 Contact">
      <div className="mx-auto max-w-[1300px] px-6 lg:px-12">
        <Reveal>
          <div className="flex items-center gap-4 mb-20" style={{ fontFamily: "'Inter', sans-serif" }}>
            <span style={{ width: 40, height: 1, background: "#FFFFFF", opacity: 0.3 }} />
            <span className="text-[11px] tracking-[0.4em] uppercase text-white/60">{t.contact?.step || "Étape 05 — La rencontre au sommet"}</span>
          </div>
        </Reveal>

        <div className="grid grid-cols-12 gap-12">
          <div className="col-span-12 lg:col-span-6">
            <Reveal>
              <h2 style={{
                fontFamily: "'Montserrat', sans-serif",
                fontWeight: 200,
                fontSize: "clamp(40px, 6vw, 92px)",
                lineHeight: 0.96,
                letterSpacing: "-0.02em",
              }}>
                {t.contact?.h2_line1 || "Initions"}<br />
                <span style={{ fontStyle: "italic", fontWeight: 500 }}>{t.contact?.h2_em || "un projet"}</span><br />
                <span style={{ color: accent, fontWeight: 500 }}>{t.contact?.h2_accent || "d'exception."}</span>
              </h2>
            </Reveal>
            <Reveal delay={120}>
              <p className="mt-10 max-w-md text-white/70"
                style={{ fontFamily: "'Inter', sans-serif", fontSize: 16, lineHeight: 1.75, fontWeight: 300 }}>
                {t.contact?.desc || "Premier rendez-vous offert. Nous étudions chaque demande sous 72h et n'engageons qu'un nombre limité de projets par an."}
              </p>
            </Reveal>
            <Reveal delay={220}>
              <div className="mt-16 grid grid-cols-2 gap-10" style={{ fontFamily: "'Inter', sans-serif" }}>
                <div>
                  <div className="text-[10px] tracking-[0.3em] uppercase text-white/50 mb-2">{t.contact?.label_atelier || "Atelier"}</div>
                  <div className="text-white/90" style={{ fontSize: 14, lineHeight: 1.6 }}>
                    ABA sarl au<br />
                    20, Rue Aguelmame Sidi Ali<br />
                    10090 Agdal, Rabat — Maroc
                  </div>
                </div>
                <div>
                  <div className="text-[10px] tracking-[0.3em] uppercase text-white/50 mb-2">{t.contact?.label_direct || "Direct"}</div>
                  <div className="text-white/90" style={{ fontSize: 14, lineHeight: 1.6 }}>
                    contact@ab-landscapes.com<br />
                    info@ab-landscapes.com<br />
                    +212 661 920 316
                  </div>
                </div>
              </div>
            </Reveal>
          </div>

          <div className="col-span-12 lg:col-span-6">
            <Reveal delay={140}>
              {sent ? (
                <div className="border border-white/10 p-10" style={{ background: "rgba(186,204,35,0.04)" }}>
                  <div style={{ fontFamily: "'Caveat', cursive", color: accent, fontSize: 56, lineHeight: 1 }}>

                  </p>
                  <button
                    onClick={() => { setSent(false); setErrors({}); setForm({ name: "", email: "", phone: "", projects: [], message: "" }); }}
                    className="mt-10 text-[11px] tracking-[0.3em] uppercase border-b pb-1"
                    style={{ fontFamily: "'Inter', sans-serif", borderColor: accent, color: accent }}
                  >
                    {t.contact?.success_again || "Envoyer un autre message"}

                </div>
              ) : (
                <form onSubmit={submit} className="flex flex-col gap-8">
                  <Field label={t.contact?.form_name || "Votre nom"} required error={errors.name}
                    value={form.name} onChange={(v) => { setForm({ ...form, name: v }); setErrors({...errors, name: false}); }} accent={accent} />
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <Field label={t.contact?.form_email || "Email"} type="email" required error={errors.email}
                      value={form.email} onChange={(v) => { setForm({ ...form, email: v }); setErrors({...errors, email: false}); }} accent={accent} />
                    <Field label={t.contact?.form_phone || "Téléphone"} type="tel" required error={errors.phone}
                      value={form.phone} onChange={(v) => { setForm({ ...form, phone: v }); setErrors({...errors, phone: false}); }} accent={accent} />
                  </div>

                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <div className="text-[10px] tracking-[0.3em] uppercase text-white/50"
                        style={{ fontFamily: "'Inter', sans-serif" }}>{t.contact?.form_type || "Prestations souhaitées"}</div>

                    </div>
                    <div className="text-[10px] mb-3"
                      style={{ fontFamily: "'Inter', sans-serif", letterSpacing: "0.05em",

                      {errors.projects ? "Veuillez sélectionner au moins une prestation" : "Sélection multiple possible"}

                    <div className="flex flex-wrap gap-2">

                        ["realisation", "Réalisation"],
                        ["entretien",   "Entretien signé"],
                        ["conseil",     "Conseil"],
                      ]).map(([k, l]) => {
                        const active = form.projects.includes(k);
                        return (
                          <button

                            className="px-4 py-2.5 text-[11px] tracking-[0.2em] uppercase border flex items-center gap-2"
                            style={{
                              fontFamily: "'Inter', sans-serif",
                              borderColor: active ? accent : "rgba(255,255,255,0.2)",
                              background: active ? accent : "transparent",
                              color: active ? "#1A1A1A" : "rgba(255,255,255,0.7)",
                              transition: "all 180ms",
                            }}

                            {active && <span style={{ fontSize: 10, lineHeight: 1 }}>✓</span>}
                            {l}
                          </button>
                        );
                      })}
                      {/* Option clé en main */}
                      <button
                        type="button"
                        onClick={() => toggleProject("clé-en-main")}
                        className="px-4 py-2.5 text-[11px] tracking-[0.2em] uppercase border flex items-center gap-2"
                        style={{
                          fontFamily: "'Inter', sans-serif",
                          borderColor: allSelected ? accent : "rgba(255,255,255,0.15)",
                          background: allSelected ? accent : "rgba(255,255,255,0.04)",
                          color: allSelected ? "#1A1A1A" : "rgba(255,255,255,0.5)",
                          transition: "all 180ms",

                    </div>
                  </div>

                  <Field
                    label={t.contact?.form_message || "Quelques mots sur votre projet"}
                    value={form.message}
                    onChange={(v) => setForm({ ...form, message: v })}
                    accent={accent}
                    multiline
                  />

                  <button
                    type="submit"
                    disabled={submitting}
                    className="self-start mt-4 px-9 py-4 text-[12px] tracking-[0.3em] uppercase"
                    style={{
                      fontFamily: "'Inter', sans-serif",
                      background: submitting ? "rgba(186,204,35,0.5)" : accent,
                      color: "#1A1A1A",
                      fontWeight: 500,
                      transition: "transform 180ms, background 200ms",
                      cursor: submitting ? "wait" : "pointer",
                    }}
                    onMouseEnter={(e) => { if (!submitting) e.currentTarget.style.transform = "translateY(-2px)"; }}
                    onMouseLeave={(e) => (e.currentTarget.style.transform = "translateY(0)")}
                  >
                    {submitting ? "Envoi en cours…" : (t.contact?.form_submit || "Envoyer la demande →")}
                  </button>
                </form>
              )}
            </Reveal>
          </div>
        </div>
      </div>
    </section>
  );

function Field({ label, value, onChange, accent, type = "text", multiline = false, required = false, error = false }) {
  const [focus, setFocus] = useState(false);
  const borderColor = error ? "#ff6b6b" : focus ? accent : "rgba(255,255,255,0.2)";
  const sharedStyle = {
    fontFamily: "'Inter', sans-serif",
    fontSize: 15,
    color: "#fff",
    borderColor,
    transition: "border-color 180ms",
  };
  return (
    <label className="block">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-[10px] tracking-[0.3em] uppercase"
          style={{ fontFamily: "'Inter', sans-serif", color: error ? "#ff6b6b" : "rgba(255,255,255,0.5)" }}>{label}</span>
        {required && <span style={{ color: error ? "#ff6b6b" : "rgba(255,255,255,0.3)", fontSize: 12, lineHeight: 1 }}>*</span>}
      </div>
      {multiline ? (
        <textarea
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onFocus={() => setFocus(true)}
          onBlur={() => setFocus(false)}
          rows={4}
          className="w-full bg-transparent border-b py-3 outline-none resize-none"
          style={sharedStyle}
        />
      ) : (
        <input
          type={type}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onFocus={() => setFocus(true)}
          onBlur={() => setFocus(false)}
          className="w-full bg-transparent border-b py-3 outline-none"
          style={sharedStyle}
        />
      )}
      {error && <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: "#ff6b6b", marginTop: 4, letterSpacing: "0.05em" }}>
        Ce champ est obligatoire
      </div>}
    </label>
  );
}

// ---------- TRAIL — a sticky little ABA mark in the top-right that draws as you scroll ----------
function Trail({ accent, scrollY, docHeight }) {
  const progress = Math.min(1, Math.max(0, scrollY / Math.max(1, docHeight - window.innerHeight)));
  return (
    <div className="fixed z-40 hidden md:flex flex-col items-center gap-3 pointer-events-none"
      style={{ right: 24, top: "50%", transform: "translateY(-50%)" }}>
      <div style={{ width: 38, height: 44 }}>
        <AbaMark stroke={accent} strokeWidth={20} drawProgress={progress} />
      </div>
      <div style={{
        fontFamily: "'Inter', sans-serif",
        fontSize: 9,
        letterSpacing: "0.3em",
        color: "#FFFFFF",
        opacity: 0.6,
        writingMode: "vertical-rl",
      }}>
        ASCENT {Math.round(progress * 100).toString().padStart(2, "0")}%
      </div>
    </div>
  );
}

  "Ochre desert":      { accent: "#D78A3F", bg: "#1A140F", stone: "#F4E8D6" },
  "Bone & ink":        { accent: "#1A1A1A", bg: "#F6F4EE", stone: "#1A1A1A" },
};

function App() {
  const [tweaks, setTweak] = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];
  const [lang, setLang] = React.useState("fr");
  const [t, setT] = React.useState(I18N_CACHE["fr"]);

  // Charger la traduction JSON à chaque changement de langue
  React.useEffect(() => {
    loadLang(lang).then(data => setT(data));
  }, [lang]);

  const scrollY = useScrollProgress();
  const [docHeight, setDocHeight] = useState(0);
  useEffect(() => {
    const measure = () => setDocHeight(document.documentElement.scrollHeight);
    measure();
    window.addEventListener("resize", measure);
    const t = setTimeout(measure, 600);
    return () => { window.removeEventListener("resize", measure); clearTimeout(t); };
  }, []);

  // expose all tweaks as CSS vars + body classes
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--accent", tweaks.accent);
    r.style.setProperty("--font-body", `'${tweaks.bodyFont}', sans-serif`);
    r.style.setProperty("--font-display", `'${tweaks.displayFont}', serif`);
    r.style.setProperty("--font-script", `'${tweaks.scriptFont}', cursive`);
    r.style.setProperty("--display-weight", String(tweaks.displayWeight));
    r.style.setProperty("--type-scale", String(tweaks.typeScale));
    r.style.setProperty("--letter-tracking", `${tweaks.letterTrack}em`);
    r.style.setProperty("--section-pad-y", `${6 * tweaks.density}rem`);
    r.style.setProperty("--container-max", `${tweaks.containerMax}px`);
    r.style.setProperty("--radius", `${tweaks.cardRadius}px`);
    r.style.setProperty("--btn-radius",
      tweaks.btnShape === "pill" ? "9999px" :
      tweaks.btnShape === "soft" ? "12px" : "0px"
    );
    r.style.setProperty("--img-sat", String(tweaks.imgSat));
    r.style.setProperty("--img-contrast", String(tweaks.imgContrast));
    r.style.setProperty("--img-bright", String(tweaks.imgBright));
    r.style.setProperty("--img-grain", String(tweaks.imgGrain));
    r.style.setProperty("--img-blur", `${tweaks.imgBlur}px`);
    r.style.setProperty("--parallax-scale", String(tweaks.parallax));
    r.style.setProperty("--reveal-distance", `${tweaks.revealDistance}px`);

    const b = document.body;
    b.classList.add("tweaked");
    b.classList.toggle("theme-light", tweaks.theme === "light");
    b.classList.toggle("motion-off", !tweaks.motion);
    b.classList.toggle("grain", tweaks.imgGrain > 0);
    b.classList.toggle("show-grid", !!tweaks.showGrid);
    b.classList.toggle("hide-philosophy", !tweaks.showPhilosophy);
    b.classList.toggle("hide-expertise", !tweaks.showExpertise);
    b.classList.toggle("hide-portfolio", !tweaks.showPortfolio);
    b.classList.toggle("hide-resilience", !tweaks.showResilience);
    b.classList.toggle("hide-contact", !tweaks.showContact);
    b.classList.toggle("cursor-dot", tweaks.cursor === "dot");
    b.style.fontFamily = `'${tweaks.bodyFont}', sans-serif`;
  }, [tweaks]);

  // Cursor dot
  useEffect(() => {
    if (tweaks.cursor !== "dot") return;
    let dot = document.querySelector(".aba-cursor");
    if (!dot) {
      dot = document.createElement("div");
      dot.className = "aba-cursor";
      document.body.appendChild(dot);
    }
    const move = (e) => {
      dot.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
    };
    window.addEventListener("mousemove", move);
    return () => {
      window.removeEventListener("mousemove", move);
      dot.remove();
    };
  }, [tweaks.cursor]);

  return (
    <VBLangContext.Provider value={{ lang, setLang, t }}>
    <div style={{ background: "var(--bg)", fontFamily: "var(--font-body)" }}>

          <window.TweakSection label="Theme & color">
            <window.TweakRadio label="Theme" value={tweaks.theme}
              options={["dark","light"]}
              onChange={(v) => setTweak("theme", v)} />

              options={["#BACC23","#8FA31E","#C8A24B","#6BA8B7","#D78A3F","#1A1A1A"]}

              onChange={(v) => setTweak("accent", v)} />

              options={Object.keys(PALETTES)}
              onChange={(name) => {
                const p = PALETTES[name];

                setTweak({ accent: p.accent });
              }} />
          </window.TweakSection>

          <window.TweakSection label="Typography">
            <window.TweakSelect label="Display font" value={tweaks.displayFont}
              onChange={(v) => setTweak("displayFont", v)}
              options={["Montserrat", "Cormorant Garamond", "Playfair Display", "DM Serif Display", "Archivo", "Fraunces", "Tenor Sans"]} />
            <window.TweakSelect label="Body font" value={tweaks.bodyFont}
              onChange={(v) => setTweak("bodyFont", v)}
              options={["Inter", "Manrope", "DM Sans", "Work Sans", "Montserrat", "Archivo"]} />
            <window.TweakSelect label="Script font" value={tweaks.scriptFont}
              onChange={(v) => setTweak("scriptFont", v)}
              options={["Caveat", "Allura", "Dancing Script", "Homemade Apple"]} />
            <window.TweakSlider label="Display weight" value={tweaks.displayWeight}
              min={100} max={700} step={100}
              onChange={(v) => setTweak("displayWeight", v)} />
            <window.TweakSlider label="Type scale" value={tweaks.typeScale}
              min={0.8} max={1.5} step={0.05}
              onChange={(v) => setTweak("typeScale", v)} />
            <window.TweakSlider label="Letter tracking" value={tweaks.letterTrack}
              min={-0.05} max={0.3} step={0.01} unit="em"
              onChange={(v) => setTweak("letterTrack", v)} />
          </window.TweakSection>

          <window.TweakSection label="Layout & density">
            <window.TweakSlider label="Section whitespace" value={tweaks.density}
              min={0.5} max={2} step={0.05} unit="×"
              onChange={(v) => setTweak("density", v)} />
            <window.TweakSlider label="Container max" value={tweaks.containerMax}

              onChange={(v) => setTweak("containerMax", v)} />
            <window.TweakSlider label="Card radius" value={tweaks.cardRadius}
              min={0} max={48} step={1} unit="px"
              onChange={(v) => setTweak("cardRadius", v)} />
            <window.TweakRadio label="Button shape" value={tweaks.btnShape}
              options={["square","soft","pill"]}
              onChange={(v) => setTweak("btnShape", v)} />
          </window.TweakSection>

          <window.TweakSection label="Imagery">
            <window.TweakSlider label="Saturation" value={tweaks.imgSat}
              min={0} max={1.5} step={0.05}
              onChange={(v) => setTweak("imgSat", v)} />
            <window.TweakSlider label="Contrast" value={tweaks.imgContrast}
              min={0.7} max={1.5} step={0.05}
              onChange={(v) => setTweak("imgContrast", v)} />
            <window.TweakSlider label="Brightness" value={tweaks.imgBright}
              min={0.6} max={1.4} step={0.05}
              onChange={(v) => setTweak("imgBright", v)} />
            <window.TweakSlider label="Grain" value={tweaks.imgGrain}

            <window.TweakSlider label="Soft blur" value={tweaks.imgBlur}

              onChange={(v) => setTweak("imgBlur", v)} />
          </window.TweakSection>

          <window.TweakSection label="Motion">
            <window.TweakToggle label="Animations" value={tweaks.motion}
              onChange={(v) => setTweak("motion", v)} />
            <window.TweakSlider label="Parallax strength" value={tweaks.parallax}
              min={0} max={2} step={0.1} unit="×"
              onChange={(v) => setTweak("parallax", v)} />
            <window.TweakSlider label="Reveal distance" value={tweaks.revealDistance}
              min={0} max={80} step={2} unit="px"
              onChange={(v) => setTweak("revealDistance", v)} />
          </window.TweakSection>

          <window.TweakSection label="Sections visible">
            <window.TweakToggle label="Philosophie" value={tweaks.showPhilosophy}
              onChange={(v) => setTweak("showPhilosophy", v)} />
            <window.TweakToggle label="Expertise" value={tweaks.showExpertise}
              onChange={(v) => setTweak("showExpertise", v)} />
            <window.TweakToggle label="Portfolio" value={tweaks.showPortfolio}
              onChange={(v) => setTweak("showPortfolio", v)} />
            <window.TweakToggle label="Résilience" value={tweaks.showResilience}
              onChange={(v) => setTweak("showResilience", v)} />
            <window.TweakToggle label="Contact" value={tweaks.showContact}
              onChange={(v) => setTweak("showContact", v)} />
          </window.TweakSection>

          <window.TweakSection label="Chrome & tools">
            <window.TweakToggle label="ABA trail" value={tweaks.showTrail}
              onChange={(v) => setTweak("showTrail", v)} />
            <window.TweakToggle label="Designer grid" value={tweaks.showGrid}
              onChange={(v) => setTweak("showGrid", v)} />
            <window.TweakRadio label="Cursor" value={tweaks.cursor}
              options={["default","dot"]}
              onChange={(v) => setTweak("cursor", v)} />
          </window.TweakSection>

        </window.TweaksPanel>
      ) : null}
    </div>
    </VBLangContext.Provider>
  );
}

root.render(<App />);

</script>

<script>
(function() {

  // 1. Bloquer le clic droit (menu contextuel)
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
  });

  // 2. Bloquer la sélection de texte (hors champs de saisie)
  document.addEventListener('selectstart', function(e) {
    if (!e.target.closest('input, textarea, select')) {
      e.preventDefault();
      return false;
    }
  });

  // 3. Bloquer le copier/coller/couper (hors champs de saisie)
  ['copy', 'cut'].forEach(function(evt) {
    document.addEventListener(evt, function(e) {
      if (!e.target.closest('input, textarea')) {
        e.preventDefault();
        return false;
      }
    });
  });

  // 4. Bloquer le drag & drop des images
  document.addEventListener('dragstart', function(e) {
    if (e.target.tagName === 'IMG' || e.target.closest('[style*="background-image"]')) {
      e.preventDefault();
      return false;
    }
  });

  // 5. Bloquer les raccourcis clavier sensibles
  document.addEventListener('keydown', function(e) {
    const tag = e.target.tagName.toLowerCase();
    const inForm = (tag === 'input' || tag === 'textarea');

    // Ctrl/Cmd + C (copier) — bloqué hors formulaire
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c' && !inForm) {
      e.preventDefault(); return false;
    }
    // Ctrl/Cmd + S (enregistrer la page)
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      e.preventDefault(); return false;
    }
    // Ctrl/Cmd + U (afficher le code source)
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u') {
      e.preventDefault(); return false;
    }
    // Ctrl/Cmd + P (imprimer)
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'p') {
      e.preventDefault(); return false;
    }
    // Ctrl/Cmd + A (sélectionner tout) — bloqué hors formulaire
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a' && !inForm) {
      e.preventDefault(); return false;
    }
    // F12 (DevTools)
    if (e.key === 'F12') {
      e.preventDefault(); return false;
    }
    // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C (DevTools)
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) {
      e.preventDefault(); return false;
    }
  });

  // 6. Bloquer l'impression via CSS (Ctrl+P bloqué par le keydown handler ci-dessus)

  // 7. Bloquer Ctrl+Shift+I / F12 via CSS print + message discret
  // (La détection active des DevTools est désactivée pour éviter les faux positifs)

})();
</script>
